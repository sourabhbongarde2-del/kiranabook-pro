<style>
:root {
  --saffron:#FF6B00; --saffron-l:#FF8C38; --saffron-pale:#FFF3E8;
  --green:#1A7F4B;   --green-l:#E8F5EE;
  --dark:#1A1A2E;    --dark2:#16213E;
  --text:#2D2D2D;    --muted:#7A7A9A;
  --border:#E8E8F0;  --red:#E53935;
  --blue:#1565C0;    --yellow:#F9A825;
  --card-sh:0 4px 24px rgba(0,0,0,0.08);
  --hover-sh:0 8px 40px rgba(255,107,0,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans',sans-serif;background:#F4F5FA;color:var(--text);min-height:100vh}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.loader-logo{font-family:'Baloo 2',cursive;font-size:36px;font-weight:800;color:white;margin-bottom:16px}
.loader-logo span{color:var(--saffron)}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--saffron);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{color:rgba(255,255,255,.5);font-size:13px;margin-top:12px}

/* ── SCREENS ── */
.screen{display:none}
.screen.active{display:block}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;background:linear-gradient(135deg,var(--dark),var(--dark2),#0F3460);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
#loginScreen::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(255,107,0,.15),transparent 70%);top:-200px;right:-200px;pointer-events:none}
.login-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;text-align:center;position:relative;z-index:1}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--saffron),var(--saffron-l));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px;box-shadow:0 8px 32px rgba(255,107,0,.4)}
.login-title{font-family:'Baloo 2',cursive;font-size:32px;font-weight:800;color:white}
.login-title span{color:var(--saffron)}
.login-sub{color:rgba(255,255,255,.5);font-size:14px;margin:6px 0 36px}
.google-btn{width:100%;padding:16px 24px;background:white;border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:16px;font-weight:600;color:var(--text);cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.google-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-features{margin-top:24px;background:rgba(255,255,255,.05);border-radius:12px;padding:16px;text-align:left;list-style:none}
.login-features li{color:rgba(255,255,255,.6);font-size:13px;padding:4px 0;display:flex;align-items:center;gap:8px}
.login-features li::before{content:'✦';color:var(--saffron);font-size:10px}

/* ── SUBSCRIPTION WALL ── */
#subScreen{min-height:100vh;background:linear-gradient(135deg,#FFF8F0,#F0FFF8);display:flex;align-items:center;justify-content:center;padding:20px}
.sub-card{background:white;border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:var(--card-sh);text-align:center}
.sub-user-row{display:flex;align-items:center;gap:12px;background:var(--saffron-pale);border-radius:12px;padding:12px 16px;margin-bottom:28px;text-align:left}
.sub-avatar{width:44px;height:44px;border-radius:50%;background:var(--saffron);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;flex-shrink:0;overflow:hidden}
.sub-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.sub-user-name{font-weight:600;font-size:15px}
.sub-user-email{font-size:12px;color:var(--muted)}
.price-badge{display:inline-flex;flex-direction:column;align-items:center;background:linear-gradient(135deg,var(--saffron),#FF4500);color:white;border-radius:20px;padding:20px 36px;margin-bottom:24px}
.price-amount{font-family:'Baloo 2',cursive;font-size:48px;font-weight:800;line-height:1}
.price-period{font-size:13px;opacity:.85;margin-top:4px}
.features-list{text-align:left;margin:20px 0;list-style:none}
.features-list li{padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:14px}
.features-list li:last-child{border-bottom:none}
.gpay-box{background:#1A1A1A;border-radius:16px;padding:20px;margin:20px 0;color:white}
.gpay-title{font-size:12px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.gpay-num{font-family:'Baloo 2',cursive;font-size:28px;font-weight:700;color:var(--yellow);letter-spacing:2px}
.gpay-name{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px}
.copy-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;margin-top:10px;transition:all .2s}
.copy-btn:hover{background:rgba(255,255,255,.2)}
.pending-msg{background:#FFF3CD;border:1px solid #FFD700;border-radius:12px;padding:14px 16px;font-size:13px;color:#856404;margin-top:12px;text-align:left}
.sub-logout{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;margin-top:16px;text-decoration:underline}

/* ── TOPBAR ── */
.topbar{background:linear-gradient(135deg,var(--dark),var(--dark2));height:60px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.topbar-brand{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;color:white}
.topbar-brand span{color:var(--saffron)}
.topbar-right{display:flex;align-items:center;gap:12px}
.sub-badge{background:var(--green);color:white;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.sub-badge.red{background:var(--red)}
.avatar-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;overflow:hidden;background:var(--saffron)}
.avatar-btn img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.avatar-btn:hover{transform:scale(1.1)}

/* ── USER MENU ── */
.user-menu{display:none;position:fixed;top:65px;right:16px;background:white;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.15);z-index:200;width:240px;overflow:hidden;border:1px solid var(--border)}
.user-menu-header{padding:16px;border-bottom:1px solid var(--border);background:var(--saffron-pale)}
.user-menu-name{font-weight:700;font-size:15px}
.user-menu-email{font-size:12px;color:var(--muted)}
.menu-item{padding:10px 14px;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;gap:8px}
.menu-item:hover{background:#F4F5FA}
.menu-item.danger{color:var(--red)}
.menu-item.danger:hover{background:#FFEBEE}

/* ── SYNC BAR ── */
.sync-bar{background:var(--green-l);border-bottom:1px solid #C8E6D0;padding:6px 20px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--green);font-weight:500}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* ── NAV TABS ── */
.nav-tabs{background:white;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;padding:0 16px;gap:4px;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:14px 18px;border:none;background:none;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;position:relative;transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-tab:hover{color:var(--saffron)}
.nav-tab.active{color:var(--saffron)}
.nav-tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--saffron);border-radius:2px 2px 0 0}

/* ── CONTENT ── */
.content{padding:20px;max-width:1200px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.ph-title{font-family:'Baloo 2',cursive;font-size:24px;font-weight:700;color:var(--dark)}
.ph-sub{font-size:13px;color:var(--muted);margin-top:2px}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:white;border-radius:16px;padding:20px;box-shadow:var(--card-sh);display:flex;align-items:center;gap:16px;transition:all .3s}
.stat-card:hover{box-shadow:var(--hover-sh);transform:translateY(-2px)}
.stat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.si-o{background:var(--saffron-pale)} .si-g{background:var(--green-l)} .si-b{background:#E3F2FD} .si-r{background:#FFEBEE}
.stat-val{font-family:'Baloo 2',cursive;font-size:28px;font-weight:700;color:var(--dark);line-height:1}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px}

/* ── CARD ── */
.card{background:white;border-radius:16px;box-shadow:var(--card-sh);overflow:hidden;margin-bottom:20px}
.card-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-title{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;color:var(--dark);display:flex;align-items:center;gap:8px}

/* ── BUTTONS ── */
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-family:'Noto Sans',sans-serif}
.btn-p{background:var(--saffron);color:white}
.btn-p:hover{background:#E55A00;transform:translateY(-1px);box-shadow:0 4px 15px rgba(255,107,0,.3)}
.btn-s{background:var(--green);color:white}
.btn-s:hover{background:#146B3C}
.btn-d{background:var(--red);color:white}
.btn-d:hover{background:#C62828}
.btn-o{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-o:hover{border-color:var(--saffron);color:var(--saffron)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#F8F9FF;padding:12px 16px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:14px 16px;border-bottom:1px solid #F0F0F8;font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFE}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-a{background:#E8F5EE;color:var(--green)}
.badge-i{background:#FFEBEE;color:var(--red)}
.badge-p{background:#FFF8E1;color:#E65100}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fc{padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);transition:all .2s;font-family:'Noto Sans',sans-serif;width:100%;background:white}
.fc:focus{outline:none;border-color:var(--saffron);box-shadow:0 0 0 3px rgba(255,107,0,.1)}
.fc::placeholder{color:#B0B0C0}

/* ── SEARCH ── */
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;transition:all .2s;font-family:'Noto Sans',sans-serif}
.search-wrap input:focus{outline:none;border-color:var(--saffron)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}

/* ── QUICK ACTIONS ── */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.qa-grid{grid-template-columns:repeat(2,1fr)}}
.qa-btn{background:white;border:1.5px solid var(--border);border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.qa-btn:hover{border-color:var(--saffron);box-shadow:var(--hover-sh);transform:translateY(-2px)}
.qa-ico{font-size:28px;margin-bottom:8px}
.qa-lbl{font-size:12px;font-weight:600;color:var(--text)}

/* ── PRODUCT ITEM ── */
.prod-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid #F0F0F8;transition:all .2s}
.prod-item:last-child{border-bottom:none}
.prod-item:hover{background:#FAFAFE}
.prod-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.prod-name{font-weight:600;font-size:15px}
.prod-meta{font-size:12px;color:var(--muted);margin-top:2px}
.prod-price{font-family:'Baloo 2',cursive;font-size:17px;font-weight:700;color:var(--saffron)}

/* ── CAT PILLS ── */
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cat-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:white;transition:all .2s}
.cat-pill.active,.cat-pill:hover{background:var(--saffron);color:white;border-color:var(--saffron)}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:white;border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .3s ease}
@keyframes mIn{from{transform:scale(.9) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-hdr{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-ttl{font-family:'Baloo 2',cursive;font-size:20px;font-weight:700}
.modal-cls{width:32px;height:32px;border-radius:50%;border:none;background:var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-cls:hover{background:var(--red);color:white}
.modal-body{padding:24px}
.modal-ftr{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);border-bottom:none}

/* ── BILLING CART ── */
.cart-item{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cart-total-box{background:var(--dark);color:white;border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.cart-total-lbl{font-size:14px;opacity:.7}
.cart-total-amt{font-family:'Baloo 2',cursive;font-size:28px;font-weight:700;color:var(--yellow)}

/* ── OWNER ── */
.owner-hdr{background:linear-gradient(135deg,var(--dark),#0F3460);border-radius:16px;padding:24px;margin-bottom:20px;color:white;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.owner-badge{background:var(--saffron);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:1px}
.owner-title{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800}
.rev-card{background:linear-gradient(135deg,var(--saffron),#FF4500);border-radius:16px;padding:24px;color:white;position:relative;overflow:hidden}
.rev-card::before{content:'₹';position:absolute;right:-10px;top:-20px;font-size:140px;opacity:.1;font-family:'Baloo 2',cursive;font-weight:800;line-height:1}
.rev-amt{font-family:'Baloo 2',cursive;font-size:40px;font-weight:800;line-height:1}
.rev-lbl{font-size:13px;opacity:.8;margin-top:6px}
.store-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ── DRIVE ── */
.drive-hdr{background:linear-gradient(135deg,#1557CB,#1A73E8);border-radius:16px;padding:20px;color:white;margin-bottom:20px}
.drive-title{font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.drive-file{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.1);border-radius:10px;margin-bottom:8px;font-size:13px}
.drive-file:last-child{margin-bottom:0}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--dark);color:white;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.2);animation:tIn .3s ease;display:flex;align-items:center;gap:8px;max-width:320px}
.toast.s{border-left:3px solid var(--green)}
.toast.e{border-left:3px solid var(--red)}
.toast.i{border-left:3px solid var(--blue)}
@keyframes tIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-ico{font-size:48px;margin-bottom:16px}
.empty-txt{font-size:16px;font-weight:600;color:var(--text)}
.empty-sub{font-size:13px;margin-top:6px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .content{padding:14px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .ph{flex-direction:column;align-items:flex-start}
  #billingGrid{grid-template-columns:1fr!important}
}
</style>

<body>

<!-- ══ LOADING ══ -->
<div id="loading">
  <div class="loader-logo">Kirana<span>Book</span></div>
  <div class="spinner"></div>
  <div class="loader-msg" id="loaderMsg">Initializing...</div>
</div>

<!-- ══ LOGIN ══ -->
<div id="loginScreen" class="screen">
  <div class="login-card">
    <div class="login-logo">🛒</div>
    <div class="login-title">Kirana<span>Book</span> Pro</div>
    <div class="login-sub">Complete Kirana Store Management System</div>
